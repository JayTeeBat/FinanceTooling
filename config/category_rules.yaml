rules:
  - id: transfers.savings.to_gbp
    priority: 220
    category_id: transfers.savings_transfer
    match: contains
    patterns:
      - to gbp savings
      - depositing savings
      - new bike savings

  - id: transfers.fx.exchange_to_gbp
    priority: 210
    category_id: transfers.fx_exchange
    match: contains
    patterns:
      - exchanged to gbp
      - exchange to gbp
      - to gbp

  - id: transfers.sepa.account_transfer
    priority: 205
    category_id: transfers.account_transfer
    match: regex
    patterns:
      - "\\bvirsepa\\b"
      - "\\bvirsepac\\b"
      - "\\bprlvsepa\\b"

  - id: groceries.ocado
    priority: 200
    category_id: groceries.food_at_home
    match: contains
    expense_only: true
    patterns:
      - ocado
      - co op group
      - coop
      - co-op
      - co op
      - tesco

  - id: shopping.tkmaxx
    priority: 195
    category_id: shopping.general_goods
    match: contains
    expense_only: true
    patterns:
      - t k maxx
      - tk maxx
      - tkmaxx
      - marks spencer
      - marks&spencer

  - id: income.mars_settlement
    priority: 192
    category_id: income.business_income
    match: contains
    income_only: true
    patterns:
      - mars chocolate uk
      - mars chocolate uk slough

  - id: shopping.mars_chocolate_expense
    priority: 191
    category_id: shopping.general_goods
    match: contains
    expense_only: true
    patterns:
      - mars chocolate

  - id: transfers.paypal
    priority: 185
    category_id: transfers.account_transfer
    match: contains
    patterns:
      - paypal payment
      - paypal

  - id: transport.tfl
    priority: 182
    category_id: transport.public_transport
    match: contains
    expense_only: true
    patterns:
      - transport for london
      - tfl travel ch
      - tfl gov uk

  - id: taxes.local_tax
    priority: 178
    category_id: taxes.local_tax
    match: contains
    expense_only: true
    patterns:
      - lb ealing
      - ealing broadway ss
      - ealing broadway ce

  - id: utilities.telecom
    priority: 176
    category_id: utilities.telecom_internet
    match: contains
    expense_only: true
    patterns:
      - vodafone
      - h3g
      - orange sa
      - orange

  - id: giving.charity
    priority: 174
    category_id: giving.charity
    match: contains
    expense_only: true
    patterns:
      - national trust mem
      - fidesco

  - id: family.childcare
    priority: 172
    category_id: family.childcare
    match: contains
    expense_only: true
    patterns:
      - tax free childcare

  - id: shopping.general
    priority: 120
    category_id: shopping.marketplace
    match: contains
    patterns:
      - amazon
      - shop
      - store
      - mall
      - ecommerce

  - id: groceries.general
    priority: 115
    category_id: groceries.food_at_home
    match: contains
    patterns:
      - supermarket
      - grocery
      - carrefour
      - market

  - id: dining.restaurants
    priority: 110
    category_id: dining.dining_out
    match: contains
    patterns:
      - restaurant
      - cafe
      - coffee
      - bar
