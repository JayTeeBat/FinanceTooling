version: 1
defaults:
  fallback_category: Uncategorized
  fallback_subcategory: null

taxonomy:
  Transfers:
    - Bank Transfer
    - Wallet Transfer
  Income:
    - Salary
    - Refunds & Interest
  Groceries:
    - Supermarket
  Shopping:
    - General Retail
  Transport:
    - Mobility
  Housing:
    - Housing Costs
  Utilities:
    - Telecom
  Fees:
    - Bank Fees

rules:
  # Template starter rules.
  # Copy this file to your runtime config path and adapt to your dataset.
  - id: income.salary
    priority: 200
    category: Income
    subcategory: Salary
    match: contains
    income_only: true
    patterns:
      - salary
      - payroll

  - id: transfers.bank_transfer
    priority: 180
    category: Transfers
    subcategory: Bank Transfer
    match: contains
    patterns:
      - transfer
      - virsepa
      - wire

  - id: groceries.general
    priority: 160
    category: Groceries
    subcategory: Supermarket
    match: contains
    expense_only: true
    patterns:
      - supermarket
      - grocery
      - tesco
