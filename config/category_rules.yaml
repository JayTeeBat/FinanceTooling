version: 2
defaults:
  fallback_category: Uncategorized
  fallback_subcategory: null

# Starter taxonomy and example reusable rules.
# This repo copy is intentionally generic and should serve as a template, not as
# a mirror of any operator's personal finance setup.

taxonomy:
  income.salary:
    labels:
      category: Income
      subcategory: Salary
    economic_role: income
    status: active
  income.benefits:
    labels:
      category: Income
      subcategory: Benefits
    economic_role: income
    status: active
  income.business_income:
    labels:
      category: Income
      subcategory: Business Income
    economic_role: income
    status: active
  income.other_income:
    labels:
      category: Income
      subcategory: Other Income
    economic_role: income
    status: active

  transfers.account_transfer:
    labels:
      category: Transfers
      subcategory: Account Transfer
    cashflow_type: transfer
    economic_role: transfer
    status: active
  transfers.investment_transfer:
    labels:
      category: Transfers
      subcategory: Investment Transfer
    cashflow_type: transfer
    economic_role: transfer
    status: active
  transfers.savings_transfer:
    labels:
      category: Transfers
      subcategory: Savings Transfer
    cashflow_type: transfer
    economic_role: transfer
    status: active
  transfers.fx_exchange:
    labels:
      category: Transfers
      subcategory: FX Exchange
    cashflow_type: transfer
    economic_role: transfer
    status: active

  excluded.non_personal:
    labels:
      category: Excluded
      subcategory: Non Personal
    cashflow_type: exclude
    economic_role: exclude
    status: active
  excluded.non_profit:
    labels:
      category: Excluded
      subcategory: Non-profit
    cashflow_type: exclude
    economic_role: exclude
    status: active

  housing.rent:
    labels:
      category: Housing
      subcategory: Rent
    economic_role: expense
    status: active
  housing.home_improvements:
    labels:
      category: Housing
      subcategory: Home Improvements
    economic_role: expense
    status: active
  housing.home_services:
    labels:
      category: Housing
      subcategory: Home Services
    economic_role: expense
    status: active

  utilities.energy_water:
    labels:
      category: Utilities
      subcategory: Energy & Water
    economic_role: expense
    status: active
  utilities.telecom_internet:
    labels:
      category: Utilities
      subcategory: Telecom & Internet
    economic_role: expense
    status: active
  utilities.other_utilities:
    labels:
      category: Utilities
      subcategory: Other Utilities
    economic_role: expense
    status: active

  groceries.food_at_home:
    labels:
      category: Groceries
      subcategory: Food at Home
    economic_role: expense
    status: active
  dining.dining_out:
    labels:
      category: Dining
      subcategory: Dining Out
    economic_role: expense
    status: active

  shopping.clothing:
    labels:
      category: Shopping
      subcategory: Clothing
    economic_role: expense
    status: active
  shopping.marketplace:
    labels:
      category: Shopping
      subcategory: Marketplace
    economic_role: expense
    status: active
  shopping.general_goods:
    labels:
      category: Shopping
      subcategory: General Goods
    economic_role: expense
    status: active
  shopping.apparel:
    labels:
      category: Shopping
      subcategory: Apparel
    economic_role: expense
    deprecated_to: shopping.clothing
    status: deprecated

  transport.public_transport:
    labels:
      category: Transport
      subcategory: Public Transport
    economic_role: expense
    status: active
  transport.car:
    labels:
      category: Transport
      subcategory: Car
    economic_role: expense
    status: active
  transport.other_transport:
    labels:
      category: Transport
      subcategory: Other Transport
    economic_role: expense
    status: active

  family.education:
    labels:
      category: Family
      subcategory: Education
    economic_role: expense
    status: active
  family.childcare:
    labels:
      category: Family
      subcategory: Childcare
    economic_role: expense
    status: active

  taxes.local_tax:
    labels:
      category: Taxes
      subcategory: Local Tax
    economic_role: expense
    status: active
  taxes.other_taxes:
    labels:
      category: Taxes
      subcategory: Other Taxes
    economic_role: expense
    status: active

  insurance.property_vehicle:
    labels:
      category: Insurance
      subcategory: Property & Vehicle
    economic_role: expense
    status: active

  leisure.entertainment:
    labels:
      category: Leisure
      subcategory: Entertainment
    economic_role: expense
    status: active

rules:
  - id: income.salary.example
    priority: 200
    category_id: income.salary
    match: contains
    income_only: true
    patterns:
      - acme payroll
      - employer payroll
      - salary payment

  - id: income.business_income.example
    priority: 195
    category_id: income.business_income
    match: contains
    income_only: true
    patterns:
      - freelance client ltd
      - consulting invoice

