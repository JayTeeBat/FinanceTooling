version: 1
defaults:
  fallback_project: Unassigned

rules:
  - id: project.family
    priority: 100
    project: Family
    match: contains
    patterns:
      - childcare
      - school
      - bp hmrc tfc
    categories:
      - Family
    expense_only: true

  - id: project.mobility
    priority: 90
    project: Mobility
    match: contains
    patterns:
      - transport for london
      - sncf
      - tfl
    categories:
      - Transport
    expense_only: true

overrides:
  - fingerprint: bp hmrc tfc
    project: Family
    bank: HSBC
    account_label: null
