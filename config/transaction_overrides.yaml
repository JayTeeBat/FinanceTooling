version: 1

# Transaction-level corrections. Supported selectors:
# - transaction_id (exact)
# - fingerprint (normalized description)
# - booking_date (YYYY-MM-DD)
# - amount_native
# - currency
# - bank
# - account_label
#
# You can also group selectors under `match: { ... }`.
# Assignment fields:
# - category_id
# - category / subcategory (legacy-compatible, category_id preferred)
# - project
# - project_tags

overrides: []

# Example:
# overrides:
#   - transaction_id: 0123456789abcdef
#     category_id: transport.car
