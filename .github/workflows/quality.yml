name: Quality

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Ruff
        run: uv run ruff check .

      - name: Type check
        run: uv run ty check src/finance_tooling tests

      - name: Pytest with coverage
        run: uv run pytest --cov=src/finance_tooling --cov-report=term-missing --cov-report=xml --durations=10
